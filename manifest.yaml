# Inventario REAL del qa-kit — fuente de verdad para los instaladores.
# Sin drift: lista solo lo que existe en el repo.
version: "2.0.0-explore"
description: "Kit acotado a EXPLORACIÓN de una URL viva (pruebas E2E). Trackers: local + azure-devops."
status: "explore-only"   # Se retiró el pipeline de 'QA del código' (capas/BDD/generación) y los trackers jira/github.

core:
  tracker_adapter:
    - core/tracker-adapter/CONTRACT.md
    - core/tracker-adapter/tracker-adapter.mjs
    - core/tracker-adapter/index.mjs           # factory: solo local + azure-devops
  agents:
    qa-orchestrator:
      - core/agents/qa-orchestrator/AGENT.md    # ciclo de exploración de URL → sink
  skills:
    url-explore:
      - core/skills/url-explore/SKILL.md        # explora una URL viva (Playwright): status/consola/captura
  templates:
    local:
      - templates/local/README.md

adapters:
  trackers:
    local:
      - adapters/trackers/local/local-adapter.mjs
      - adapters/trackers/local/README.md
    azure-devops:
      - adapters/trackers/azure-devops/azure-devops-adapter.mjs   # contrato explore-only (preflight/getWorkItem/publishEvidence/adjuntos)
      - adapters/trackers/azure-devops/ado-rest.mjs               # cliente REST (rutas/auth)
      - adapters/trackers/azure-devops/ado-html.mjs               # parse de la HU + render del resumen
      - adapters/trackers/azure-devops/tc-match.mjs               # captura → Task hijo (adjuntos)
      - adapters/trackers/azure-devops/README.md
  shared:
    - adapters/_shared/http-retry.mjs                             # transporte HTTP default con reintento ante fallos de red transitorios

profiles:
  - profiles/default.yaml
  presets:
    - profiles/presets/azure-devops.yaml
  overlays:
    - profiles/overlays/flit.yaml

runtime:
  profile:
    - runtime/profile/yaml-lite.mjs
    - runtime/profile/resolve-profile.mjs
  runners:
    - runtime/runners/explore.mjs         # única capa: explora una URL viva (gated por appUrl)
  orchestrator: runtime/orchestrator.mjs  # backbone slim: resolve-profile → adapter → explore → publishEvidence
  cli: runtime/cli.mjs                    # entrypoint: node runtime/cli.mjs --url <https://app>
  delivery_build: runtime/delivery/build.mjs  # empaqueta core/ a cada target
  evidence:
    - runtime/evidence/local-sink.mjs
  smoke_test: runtime/smoke-test.mjs      # 14 casos (resolver + explore-suite), offline

delivery:        # targets generados desde core/ por runtime/delivery/build.mjs
  generator: runtime/delivery/build.mjs
  targets: [plain, claude-code, cursor]   # salida en dist/<target>/ (no versionada)
  docs:
    - delivery/cursor/README.md
    - delivery/claude-code/README.md
    - delivery/plain/README.md

webapp:          # UX web multitenant (Next.js, :4312) — el producto laboral
  note: "Servicio multitenant (Postgres+RLS, auth, cifrado). Modo único: Explorar URL. Ver docs/MULTITENANT.md."

packs:           # opcionales, NO instalados por defecto
  dev-side:
    - packs/dev-side/README.md
