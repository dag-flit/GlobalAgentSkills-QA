# Inventario REAL del qa-kit global — fuente de verdad para los instaladores.
# Sin drift: lista solo lo que existe en el repo (corrige D2 del documento de arquitectura).
version: "0.2.0-f2"
description: "Local-first corre (F1) + ADO como adapter completo: dual sink + adjuntos (F2)"
status: "active"   # F0 andamiaje · F1 runners+orquestador · F2 adapter ADO (REST, dual, tc-match).

core:
  tracker_adapter:
    - core/tracker-adapter/CONTRACT.md
    - core/tracker-adapter/tracker-adapter.mjs
    - core/tracker-adapter/index.mjs
  agents:
    qa-orchestrator:
      - core/agents/qa-orchestrator/AGENT.md      # F1-T3: preflight condicional + ciclo (runtime/orchestrator)
    # executor, generator, explorer, healer: se portan más adelante en F1
  skills:
    qa-detect:
      - core/skills/qa-detect/SKILL.md            # F1-T1: detección de capas/stack (runtime/detect)
    static-analysis-gate:
      - core/skills/static-analysis-gate/SKILL.md # F1-T2: runner static → sink (runtime/runners)
    unit-test-runner:
      - core/skills/unit-test-runner/SKILL.md     # F1-T4: runner unit → sink (D1 cerrada)
    e2e-runner:
      - core/skills/e2e-runner/SKILL.md           # F1-T4: runner e2e → sink (ex playwright-runner)
  templates:
    local:
      - templates/local/README.md

adapters:
  trackers:
    local:
      - adapters/trackers/local/local-adapter.mjs
      - adapters/trackers/local/README.md
    azure-devops:
      - adapters/trackers/azure-devops/azure-devops-adapter.mjs   # F2: contrato real (transporte inyectable)
      - adapters/trackers/azure-devops/ado-rest.mjs               # F2: cliente REST (rutas/auth)
      - adapters/trackers/azure-devops/tc-match.mjs               # F2.2: tc_id → Task hijo (adjuntos)
      - adapters/trackers/azure-devops/README.md
    # github: []   # fase 5
    # jira: []     # fase 5

profiles:
  - profiles/default.yaml
  presets:
    - profiles/presets/azure-devops.yaml
  overlays:
    - profiles/overlays/flit.yaml

runtime:
  profile:
    - runtime/profile/yaml-lite.mjs
    - runtime/profile/resolve-profile.mjs
  detect:
    - runtime/detect/qa-detect.mjs
  runners:
    - runtime/runners/_runner-core.mjs    # lógica común (resolveBin/exec/runLayer)
    - runtime/runners/static-analysis.mjs
    - runtime/runners/unit.mjs
    - runtime/runners/e2e.mjs
  orchestrator: runtime/orchestrator.mjs
  evidence:
    - runtime/evidence/local-sink.mjs
  smoke_test: runtime/smoke-test.mjs

delivery:        # fase 4 — empaque por runtime, generado desde core/
  - delivery/cursor/README.md
  - delivery/claude-code/README.md
  - delivery/plain/README.md

packs:           # opcionales, NO instalados por defecto
  dev-side:
    - packs/dev-side/README.md
