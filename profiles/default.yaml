# Perfil QA genérico — DEFAULT local-first.
# El kit está acotado a EXPLORAR una URL viva (E2E). Un repo nuevo corre con SOLO este archivo:
# sin tracker, sin red, sin editar nada.
# Resolución: default.yaml <- presets/<tracker>.yaml <- overlays/<org>.yaml <- qa-project.profile.yaml

tracker: local            # local | azure-devops

project:
  name: auto              # auto = nombre de carpeta / git remote

locale:
  timezone: auto          # auto = TZ del sistema

evidence:
  sink: auto              # auto = sigue al tracker (local->local, azure->dual)
  output_dir: qa-evidence # carpeta del reporte local
  formats:
    - md                  # para diff / CI
    - html               # para abrir

supervision:
  enabled: false          # bloque "@encargado" solo cuando el tracker lo exige
