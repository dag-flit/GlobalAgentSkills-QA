# Preset de tracker Jira Cloud. Se aplica sobre default.yaml.
# Uso en el repo:  profile: jira  +  env.JIRA_BASE_URL / JIRA_EMAIL / JIRA_TOKEN / JIRA_PROJECT_KEY
# Soporta custom fields y transiciones. NO contiene convenciones de organización.

tracker: jira

evidence:
  sink: dual              # comentario en el issue + reporte local

human_gates:
  publish_test_cases: true
  publish_bugs: true
  approve_regression: true

jira:
  bug_issue_type: "Bug"
  fields:                 # clave lógica → id de custom field (ajustar por instancia)
    test_start_date: "customfield_10010"
    test_end_date: "customfield_10011"
    retest: "customfield_10012"
  transitions:            # ids de transición del workflow (ajustar por proyecto)
    pass: "31"            # p.ej. "Done"
    fail: "21"            # p.ej. "In Progress"
